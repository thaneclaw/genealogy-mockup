<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug — Expandable Tree</title>
    <style>
        body { font-family: sans-serif; padding: 40px; }
        .card { background: #eee; padding: 20px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Debug: Loading...</h1>
    <div id="output"></div>
    <script>
        const out = document.getElementById('output');
        try {
            const data = {
                'g0-0': { name: "Graeme", gen: 0, parents: ['g1-0','g1-1'] },
                'g1-0': { name: "Joseph", gen: 1, parents: null },
                'g1-1': { name: "Rose", gen: 1, parents: null }
            };
            
            function buildTree(id, maxGen) {
                const visible = new Set();
                const queue = [{id: id, gen: 0}];
                while (queue.length > 0) {
                    const node = queue.shift();
                    if (node.gen > maxGen) continue;
                    visible.add(node.id);
                    const p = data[node.id];
                    if (p.parents) {
                        p.parents.forEach(pid => queue.push({id: pid, gen: node.gen + 1}));
                    }
                }
                return visible;
            }
            
            const v = buildTree('g0-0', 4);
            out.innerHTML = '<div class="card">✅ JS works! Visible nodes: ' + Array.from(v).join(', ') + '</div>';
            
            // Now try a minimal tree render
            const gens = [];
            v.forEach(id => {
                const p = data[id];
                if (!gens[p.gen]) gens[p.gen] = [];
                gens[p.gen].push(p.name);
            });
            
            gens.forEach((g, i) => {
                out.innerHTML += '<div class="card">Gen ' + i + ': ' + g.join(', ') + '</div>';
            });
            
        } catch(e) {
            out.innerHTML = '<div class="card" style="background:#fcc;">❌ Error: ' + e.message + '</div>';
        }
    </script>
</body>
</html>

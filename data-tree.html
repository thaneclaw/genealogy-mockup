<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Roots — Data Tree</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #1a1510; font-family: 'Cormorant Garamond', serif; }

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 50px;
  background: #2a1f15; border-bottom: 2px solid #4a3a22;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 300;
}
.header h1 { font-family: 'Cinzel Decorative', serif; font-size: 16px; color: #e8dcc8; }
.header-stats { display: flex; gap: 16px; font-size: 12px; color: #9a8a6a; }
.header-stats span { color: #e8dcc8; font-weight: 600; }
.header-btn {
  width: 32px; height: 32px; background: #3e3225; color: #e8dcc8;
  border: 1px solid #6b5537; border-radius: 6px; font-size: 18px; cursor: pointer;
}

/* Tree scroll area */
.tree-scroll {
  position: fixed; top: 50px; left: 0; right: 0; bottom: 0;
  overflow: auto; -webkit-overflow-scrolling: touch;
  background: radial-gradient(ellipse at center, #2a1f15 0%, #0c0803 100%);
}
.tree-wrap {
  position: relative; min-width: fit-content; min-height: 100%;
  padding: 40px 30px;
  transform: scale(var(--zoom, 1));
  transform-origin: top left;
  transition: transform 0.15s ease;
}

.zoom-controls {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,248,225,0.15);
  padding: 2px 8px; border-radius: 6px;
}
.zoom-controls span {
  font-size: 11px; color: #8a7a5a; min-width: 36px; text-align: center;
  font-family: 'Cormorant Garamond', serif;
}
.zoom-btn { font-size: 14px; padding: 2px 8px; min-width: 28px; }

/* Generation columns */
.generation {
  display: flex; flex-direction: column;
  position: relative; min-width: 180px;
}
.gen-label {
  position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel Decorative', serif; font-size: 10px;
  text-transform: uppercase; letter-spacing: 2px; color: #8a7a5a;
  white-space: nowrap;
}

/* Person cards */
.person-card {
  position: absolute; left: 0; width: 170px;
  background: rgba(250, 244, 230, 0.94);
  border: 2px solid #4a3a22; border-radius: 3px;
  padding: 8px 12px; text-align: center;
  z-index: 2; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  transition: transform 0.15s, box-shadow 0.15s;
}
.person-card::before {
  content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px;
  border: 1px solid #8a7a5a; pointer-events: none; border-radius: 1px;
}
.person-card:hover { transform: scale(1.03); box-shadow: 0 4px 16px rgba(0,0,0,0.35); }
.person-card:active { transform: scale(0.98); }

.person-card .name {
  font-family: 'Cinzel Decorative', serif; font-size: 11px;
  color: #2a1f10; letter-spacing: 0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.person-card .years {
  font-family: 'Cormorant Garamond', serif; font-size: 9px;
  color: #7a6545; margin-top: 2px; font-style: italic;
}
.person-card .doc-badges {
  margin-top: 4px; display: flex; justify-content: center; gap: 3px;
}
.person-card .doc-badge {
  font-size: 8px; padding: 1px 5px; border-radius: 3px;
  font-family: 'Cormorant Garamond', serif; font-weight: 600;
}
.doc-badge.bc { background: #dcfce7; color: #166534; }
.doc-badge.mc { background: #dbeafe; color: #1e40af; }
.doc-badge.dc { background: #fee2e2; color: #991b1b; }

.person-card.confirmed { border-left: 4px solid #22c55e; }
.person-card.probable { border-left: 4px solid #f59e0b; }
.person-card.brickwall { border-left: 4px dashed #ef4444; }
.person-card.you { border: 2px solid #c4a875; background: rgba(255,248,225,0.97); }
.person-card.blank {
  background: rgba(250, 244, 230, 0.45);
  border: 2px dashed #b8a88a;
  opacity: 0.6;
  cursor: default;
}
.person-card.blank:hover { transform: none; box-shadow: none; }
.person-card.blank .name,
.person-card.blank .years { color: #b8a88a; }

/* SVG connectors */
.lines-svg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }

/* Cert panel */
.cert-panel {
  display: none; position: fixed; top: 50px; right: 0; bottom: 0;
  width: 380px; max-width: 95vw;
  background: #f5eedc; z-index: 400;
  border-left: 3px solid #4a3a22;
}
.cert-panel.active { display: flex; flex-direction: column; animation: slideIn 0.25s ease; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

.cert-header {
  background: #2a1f15; color: #e8dcc8; padding: 14px 16px;
  position: relative; font-family: 'Cinzel Decorative', serif;
}
.cert-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #e8dcc8; font-size: 24px; cursor: pointer; }

.cert-type-selector { display: flex; gap: 6px; margin-bottom: 12px; }
.cert-type-btn {
  flex: 1; padding: 8px; border: 2px solid #8a7a5a; background: #f5eedc;
  border-radius: 4px; font-family: 'Cinzel Decorative', serif; font-size: 11px;
  color: #4a3a22; cursor: pointer;
}
.cert-type-btn.active { background: #4a3a22; color: #f5eedc; border-color: #4a3a22; }

.cert-upload-area {
  border: 2px dashed #8a7a5a; border-radius: 8px;
  padding: 20px; text-align: center; cursor: pointer;
  background: #faf6ee; margin-bottom: 8px;
}
.cert-upload-area:hover { border-color: #4a3a22; background: #f0e8d8; }
.cert-upload-btns { display: flex; gap: 10px; margin-bottom: 12px; }
.cert-upload-btns button {
  flex: 1; padding: 14px 10px; border: 2px solid #8a7a5a; border-radius: 8px;
  background: #faf6ee; cursor: pointer; text-align: center;
  font-family: 'Cormorant Garamond', serif; font-size: 13px; color: #4a3a22;
  transition: border-color 0.15s, background 0.15s;
}
.cert-upload-btns button:hover { border-color: #4a3a22; background: #f0e8d8; }
.cert-upload-btns .camera-btn { border-color: #6b5537; }
.cert-upload-btns .camera-btn span { font-size: 28px; display: block; margin-bottom: 4px; }
.cert-upload-btns .file-btn span { font-size: 28px; display: block; margin-bottom: 4px; }
.cert-preview-area { display: none; margin-bottom: 12px; text-align: center; }
.cert-preview-area img { max-width: 100%; max-height: 200px; border-radius: 4px; border: 2px solid #8a7a5a; }

.cert-status {
  display: none; padding: 10px; border-radius: 4px;
  font-family: 'Cormorant Garamond', serif; font-size: 13px;
  text-align: center; margin-bottom: 10px;
}
.cert-status.loading { display: block; background: #fef3c7; color: #92400e; }
.cert-status.success { display: block; background: #dcfce7; color: #166534; }
.cert-status.error { display: block; background: #fee2e2; color: #991b1b; }

.cert-result-card {
  background: #fff; border: 2px solid #8a7a5a; border-radius: 6px;
  padding: 12px; margin-bottom: 10px; cursor: pointer;
  font-family: 'Cormorant Garamond', serif; overflow: hidden;
}
.cert-result-card.selected { border-color: #4a3a22; background: #f0e8d8; }
.cert-result-card .field-row {
  display: flex; justify-content: space-between; padding: 3px 0;
  border-bottom: 1px solid #e8dcc8; font-size: 12px;
}
.cert-result-card .field-row label { color: #6b5537; font-weight: 600; text-transform: uppercase; font-size: 10px; }
.cert-field-edit {
  display: flex; align-items: center; gap: 6px;
  margin: 4px 0; flex-wrap: nowrap;
}
.cert-field-edit .cert-field-label {
  color: #6b5537; font-weight: 600; text-transform: uppercase;
  font-size: 10px; min-width: 70px; max-width: 80px; flex-shrink: 0;
}
.cert-field-edit input {
  flex: 1; min-width: 0; padding: 4px 6px;
  border: 1px solid #ccc; border-radius: 3px;
  font-size: 12px; font-family: 'Cormorant Garamond', serif;
  background: #fff; color: #2a1f10;
}

.cert-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #e8dcc8; font-size: 24px; cursor: pointer; }

.cert-toolbar { padding: 12px 16px; border-bottom: 2px solid #4a3a22; flex-shrink: 0; background: #f5eedc; }

.cert-body { padding: 16px; overflow-y: auto; flex: 1; min-height: 0; -webkit-overflow-scrolling: touch; }

.cert-actions { display: none; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.cert-panel.has-results .cert-actions { display: flex; }
.cert-actions button {
  flex: 1 1 auto; padding: 10px; border: 2px solid #4a3a22; border-radius: 4px;
  font-family: 'Cinzel Decorative', serif; font-size: 11px; cursor: pointer;
  min-width: 100px;
}
.cert-confirm { background: #4a3a22; color: #f5eedc; }
.cert-retry { background: #f5eedc; color: #4a3a22; }
.cert-swap { background: #fef3c7; color: #92400e; border-color: #f59e0b; }

/* Detail panel */
.detail-panel {
  display: none; position: fixed; top: 50px; right: 0;
  width: 360px; max-width: 90vw; height: calc(100vh - 50px);
  background: #f5eedc; z-index: 400; overflow-y: auto;
  border-left: 3px solid #4a3a22;
}
.detail-panel.active { display: block; animation: slideIn 0.25s ease; }
.detail-header { background: #2a1f15; color: #e8dcc8; padding: 14px 16px; position: relative; }
.detail-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #e8dcc8; font-size: 24px; cursor: pointer; }
.detail-body { padding: 16px; }
.detail-field { margin-bottom: 12px; }
.detail-field label { display: block; font-size: 10px; color: #6b5537; text-transform: uppercase; margin-bottom: 3px; font-weight: 600; }
.detail-field input, .detail-field textarea {
  width: 100%; padding: 8px; border: 1px solid #8a7a5a; border-radius: 4px;
  background: #fff; font-family: 'Cormorant Garamond', serif; font-size: 13px; color: #2a1f10;
}
.detail-field textarea { min-height: 60px; resize: vertical; }

/* Save/Load buttons */
.save-bar {
  position: fixed; bottom: 16px; left: 16px; display: flex; gap: 8px; z-index: 200;
}
.save-bar button {
  padding: 8px 14px; border: none; border-radius: 4px;
  font-family: 'Cormorant Garamond', serif; font-size: 11px; cursor: pointer;
  background: #3e3225; color: #f0e6d2; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* Toast */
#toastMsg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(30,25,20,0.92); color: #f0e6d2; padding: 14px 24px;
  border-radius: 8px; font-family: 'Cormorant Garamond', serif; font-size: 15px;
  z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.4); text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <h1>Roots — Data Tree</h1>
  <div class="header-stats">
    <div>People: <span id="statPeople">0</span></div>
    <div>Confirmed: <span id="statConfirmed">0</span></div>
    <div>Walls: <span id="statWalls">0</span></div>
  </div>
  <div class="zoom-controls">
    <button class="header-btn zoom-btn" id="zoomOut" title="Zoom out">−</button>
    <span id="zoomLevel">100%</span>
    <button class="header-btn zoom-btn" id="zoomIn" title="Zoom in">+</button>

</div>

<div class="tree-scroll" id="treeScroll">

</div>

<!-- Cert Panel -->
<div class="cert-panel" id="certPanel">

      <button class="cert-clear" id="certClear" style="background:#e8dcc8;color:#4a3a22;">✕ Clear</button>

  <div class="cert-body" id="certBody">
    <div class="cert-upload-btns" id="certUploadBtns">
      <button class="camera-btn" id="certCameraBtn"><span>📷</span>Camera</button>
      <button class="file-btn" id="certFileBtn"><span>📁</span>Choose File</button>
    </div>
    <div class="cert-upload-area" id="certUploadArea" style="display:none">
      <div style="font-size:24px;margin-bottom:8px;">📄</div>
      <div style="font-family:'Cinzel Decorative',serif;font-size:13px;color:#4a3a22;">Tap to upload cert</div>
      <div style="font-size:11px;color:#8a7a5a;margin-top:4px;">Birth, marriage, or death record</div>
    </div>
    <input type="file" id="certFileInput" accept="image/*" style="display:none">
    <input type="file" id="certCameraInput" accept="image/*" capture="environment" style="display:none">

    <div id="certResults"></div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <button class="detail-close" id="detailClose">&times;</button>
    <div style="font-size:14px;" id="detailTitle">Person</div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- Save/Load bar -->
<div class="save-bar">
  <button id="saveBtn">⬇ Save Session</button>
  <button id="loadBtn">⬆ Load Session</button>
  <button id="resetBtn" style="background:#5c2a2a;color:#f5eedc;">↻ Reset</button>
  <input type="file" id="loadFileInput" accept=".json,.familytree" style="display:none">
</div>

<!-- Custom Confirm Dialog -->
<div id="confirmDialog" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:10000;justify-content:center;align-items:center;">
  <div style="background:#f5eedc;border:3px solid #4a3a22;border-radius:8px;padding:24px;max-width:320px;width:90%;text-align:center;">
    <div style="font-family:'Cinzel Decorative',serif;font-size:16px;color:#4a3a22;margin-bottom:12px;">Reset Tree</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:14px;color:#2a1f10;margin-bottom:20px;">Clear all data and start fresh? This cannot be undone.</div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button id="confirmCancel" style="padding:8px 16px;border:2px solid #4a3a22;border-radius:4px;background:#f5eedc;color:#4a3a22;font-family:'Cinzel Decorative',serif;font-size:12px;cursor:pointer;">Cancel</button>
      <button id="confirmOk" style="padding:8px 16px;border:2px solid #4a3a22;border-radius:4px;background:#5c2a2a;color:#f5eedc;font-family:'Cinzel Decorative',serif;font-size:12px;cursor:pointer;">Reset</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DEBUG LOG CAPTURE (for mobile troubleshooting)
// ═══════════════════════════════════════════════════════════════
const debugLogs = [];
const origConsoleError = console.error;
const origConsoleLog = console.log;
const origConsoleWarn = console.warn;
function pushLog(type, args) {
  const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a).slice(0,200) : String(a)).join(' ');
  debugLogs.push({t: type, m: msg, time: new Date().toLocaleTimeString()});
  if (debugLogs.length > 50) debugLogs.shift();
}
console.error = function(...args) { pushLog('ERR', args); origConsoleError.apply(console, args); };
console.log = function(...args) { pushLog('LOG', args); origConsoleLog.apply(console, args); };
console.warn = function(...args) { pushLog('WRN', args); origConsoleWarn.apply(console, args); };
window.onerror = function(msg, url, line, col, err) {
  pushLog('EXC', [msg, 'at', url + ':' + line]);
};
function getDebugLogs() {
  return debugLogs.slice(-20).map(l => l.time + ' [' + l.t + '] ' + l.m).join('\n');
}

// ═══════════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════════

// Extended person model: full fields for cert-driven population
function createPerson(id, gen, name, years, status, opts) {
  opts = opts || {};
  return {
    id: id,
    gen: gen,
    name: name,
    fullName: opts.fullName || name,
    years: years,
    birthDate: opts.birthDate || '',
    deathDate: opts.deathDate || '',
    status: status,
    occupation: opts.occupation || '',
    birthplace: opts.birthplace || '',
    maidenName: opts.maidenName || '',
    spouseName: opts.spouseName || '',
    spouseId: opts.spouseId || null,
    parents: opts.parents || null,
    children: opts.children || [],
    docs: opts.docs || [],
    notes: opts.notes || '',
    source: opts.source || ''
  };
}

let people = [];
let nextId = 1;
let selectedCertType = 'birth';
let pendingDocFile = null;
let pendingDocImage = null;
let lastTranscription = null;
let selectedEntryIndex = 0;

function initDefaultData() {
  people = [];
  nextId = 1;
  // Gen 0: blank placeholder for the user to populate with their birth cert
  people.push(createPerson(nextId++, 0, 'Name', '?', 'blank', {}));
  // Gens 1-8: blank placeholder cards (2^gen each)
  for (let g = 1; g <= 8; g++) {
    const count = Math.pow(2, g);
    for (let i = 0; i < count; i++) {
      people.push(createPerson(nextId++, g, 'Name', '?', 'blank', {}));
    }
  }
  // Wire parent-child relationships AND spouse relationships
  for (let g = 0; g < 8; g++) {
    const gen = people.filter(p => p.gen === g).sort((a,b) => a.id - b.id);
    const nextGen = people.filter(p => p.gen === g + 1).sort((a,b) => a.id - b.id);
    gen.forEach((p, i) => {
      const father = nextGen[2 * i];
      const mother = nextGen[2 * i + 1];
      if (father && mother) {
        p.parents = [father.id, mother.id];
        // Wire spouse relationship between parents
        father.spouseId = mother.id;
        mother.spouseId = father.id;
      }
    });
  }
}

const CARD_W = 160, GAP_X = 50, GAP_Y = 12, JUNCT_DIST = 18;
const wrap = document.getElementById('treeWrap');
const svg = document.getElementById('linesSvg');
const scroll = document.getElementById('treeScroll');
const svgNS = 'http://www.w3.org/2000/svg';
let cardEls = new Map();

let treeWidth = 0, treeHeight = 0;
let zoom = 0.25;

function renderTree() {
  wrap.querySelectorAll('.person-card').forEach(el => el.remove());
  cardEls.clear();
  const maxGen = Math.max(...people.map(p => p.gen));
  const gens = [];
  for (let g = 0; g <= maxGen; g++) gens[g] = people.filter(p => p.gen === g).sort((a,b) => a.id - b.id);
  const colLeft = gens.map((_, g) => g * (CARD_W + GAP_X));
  people.forEach(person => {
    const el = document.createElement('div');
    el.className = 'person-card ' + person.status + (person.id === 1 ? ' you' : '');
    el.dataset.id = person.id;
    let h = '<div class="name">' + person.name + '</div><div class="years">' + person.years + '</div>';
    if (person.docs && person.docs.length) {
      h += '<div class="doc-badges">';
      person.docs.forEach(d => { const t = (d.type || 'bc').toLowerCase(); h += '<span class="doc-badge ' + t + '">' + t.toUpperCase() + '</span>'; });
      h += '</div>';
    }
    el.innerHTML = h;
    el.style.left = colLeft[person.gen] + 'px';
    el.style.top = '0px'; el.style.opacity = '0';
    el.onclick = () => openDetail(person);
    wrap.appendChild(el); cardEls.set(person.id, el);
  });
  document.body.offsetHeight;
  const hMap = new Map();
  cardEls.forEach((el, id) => hMap.set(id, el.offsetHeight));

  // Cascading layout: start from rightmost gen, position equally, then cascade left
  const topMap = new Map();
  if (gens[maxGen] && gens[maxGen].length > 0) {
    // Position rightmost generation with equal spacing from top
    let y = 30;
    gens[maxGen].forEach(p => {
      topMap.set(p.id, y);
      y += hMap.get(p.id) + GAP_Y;
    });
    // Cascade leftward: each card centered between its two parents in the next gen
    for (let g = maxGen - 1; g >= 0; g--) {
      if (!gens[g]) continue;
      gens[g].forEach(p => {
        if (!p.parents || p.parents.length < 2) return;
        const father = people.find(x => x.id === p.parents[0]);
        const mother = people.find(x => x.id === p.parents[1]);
        if (!father || !mother) return;
        const fy = topMap.get(father.id);
        const my = topMap.get(mother.id);
        if (fy === undefined || my === undefined) return;
        const fh = hMap.get(father.id);
        const mh = hMap.get(mother.id);
        const midCenter = (fy + fh/2 + my + mh/2) / 2;
        topMap.set(p.id, midCenter - hMap.get(p.id) / 2);
      });
    }
  }

  cardEls.forEach((el, id) => { el.style.top = (topMap.get(id) || 30) + 'px'; el.style.opacity = '1'; });
  treeWidth = colLeft[maxGen] + CARD_W + 40;
  treeHeight = Math.max(scroll.clientHeight, ...people.map(p => (topMap.get(p.id) || 0) + hMap.get(p.id))) + 60;
  wrap.style.width = treeWidth + 'px';
  wrap.style.height = treeHeight + 'px';
  // Update zoom sizer for scroll area
  const sizer = document.getElementById('zoomSizer');
  if (sizer) {
    sizer.style.width = (treeWidth * zoom) + 'px';
    sizer.style.height = (treeHeight * zoom) + 'px';
  }
  wrap.style.setProperty('--zoom', zoom);
  document.getElementById('statPeople').textContent = people.length;
  document.getElementById('statConfirmed').textContent = people.filter(p => p.status === 'confirmed' || p.status === 'you').length;
  document.getElementById('statWalls').textContent = people.filter(p => p.status === 'brickwall').length;
  drawLines();
}

function drawLines() {
  svg.setAttribute('width', treeWidth);
  svg.setAttribute('height', treeHeight);
  svg.innerHTML = '';
  people.forEach(child => {
    if (!child.parents || child.parents.length < 2) return;
    const childEl = cardEls.get(child.id), fatherEl = cardEls.get(child.parents[0]), motherEl = cardEls.get(child.parents[1]);
    if (!childEl || !fatherEl || !motherEl) return;
    // Use offset coordinates relative to treeWrap (unaffected by zoom transform)
    const cx = childEl.offsetLeft + childEl.offsetWidth;
    const cy = childEl.offsetTop + childEl.offsetHeight / 2;
    const fx = fatherEl.offsetLeft;
    const fy = fatherEl.offsetTop + fatherEl.offsetHeight / 2;
    const mx = motherEl.offsetLeft;
    const my = motherEl.offsetTop + motherEl.offsetHeight / 2;
    const jx = fx - JUNCT_DIST, midY = (fy + my) / 2;
    const curve = document.createElementNS(svgNS, 'path');
    curve.setAttribute('d', 'M' + cx + ',' + cy + ' C' + (cx+16) + ',' + cy + ' ' + (jx-8) + ',' + midY + ' ' + jx + ',' + midY);
    curve.setAttribute('stroke', '#8a7a5a'); curve.setAttribute('stroke-width', '1.5'); curve.setAttribute('fill', 'none');
    svg.appendChild(curve);
    const vLine = document.createElementNS(svgNS, 'line');
    vLine.setAttribute('x1', jx); vLine.setAttribute('y1', fy); vLine.setAttribute('x2', jx); vLine.setAttribute('y2', my);
    vLine.setAttribute('stroke', '#8a7a5a'); vLine.setAttribute('stroke-width', '1.5'); svg.appendChild(vLine);
    const fLine = document.createElementNS(svgNS, 'line');
    fLine.setAttribute('x1', jx); fLine.setAttribute('y1', fy); fLine.setAttribute('x2', fx); fLine.setAttribute('y2', fy);
    fLine.setAttribute('stroke', '#8a7a5a'); fLine.setAttribute('stroke-width', '1.5'); svg.appendChild(fLine);
    const mLine = document.createElementNS(svgNS, 'line');
    mLine.setAttribute('x1', jx); mLine.setAttribute('y1', my); mLine.setAttribute('x2', mx); mLine.setAttribute('y2', my);
    mLine.setAttribute('stroke', '#8a7a5a'); mLine.setAttribute('stroke-width', '1.5'); svg.appendChild(mLine);
  });
}

async function processDocFile(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    pendingDocImage = ev.target.result;
    document.getElementById('certPreviewImg').src = pendingDocImage;
    document.getElementById('certPreviewArea').style.display = 'block';
    document.getElementById('certUploadBtns').style.display = 'none';
    document.getElementById('certUploadArea').style.display = 'none';
  };
  reader.readAsDataURL(file);

  const cs = document.getElementById('certStatus');
  cs.className = 'cert-status loading'; cs.textContent = 'Preparing image...'; cs.style.display = 'block';
  document.getElementById('certResults').innerHTML = '';
  certPanel.classList.remove('has-results');

  let base64;
  try {
    base64 = await resizeAndCompressImage(file, 600, 0.5);
    const sizeKB = Math.round(base64.length * 0.75 / 1024);
    console.log(`[UPLOAD] Compressed image size: ~${sizeKB}KB`);
    if (sizeKB > 300) {
      console.log('[UPLOAD] Image still large, re-compressing smaller...');
      base64 = await resizeAndCompressImage(file, 400, 0.45);
      const sizeKB2 = Math.round(base64.length * 0.75 / 1024);
      console.log(`[UPLOAD] Re-compressed size: ~${sizeKB2}KB`);
    }
    const finalKB = Math.round(base64.length * 0.75 / 1024);
    if (finalKB > 500) {
      throw new Error('Image too large after compression (' + finalKB + 'KB). Try cropping or a clearer photo.');
    }
  }
  catch (compressErr) {
    console.error('[COMPRESS ERROR]', compressErr);
    cs.className = 'cert-status error';
    cs.innerHTML = 'Image error: ' + compressErr.message + '<br><small>Try a smaller or clearer photo</small>';
    certPanel.classList.add('has-results');
    return;
  }
  pendingDocImage = base64;
  await sendToTranscriptionAPI(base64);
}

async function resizeAndCompressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
      else if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    const r = new FileReader();
    r.onload = (e) => { img.src = e.target.result; };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

const API_URL = 'https://genealogy-api.vercel.app/api/transcribe';

async function sendToTranscriptionAPI(base64) {
  const cs = document.getElementById('certStatus');
  
  // Phase 1: GET connectivity check
  cs.className = 'cert-status loading'; 
  cs.textContent = 'Checking connection (1/3)...';
  try {
    const ping = await fetch('https://genealogy-api.vercel.app/api/test', { method: 'GET', cache: 'no-store' });
    if (!ping.ok) throw new Error('API ping failed: ' + ping.status);
  } catch (err) {
    cs.className = 'cert-status error';
    cs.innerHTML = 'Network error: Cannot reach API server (GET blocked).<br><small>Try: 1) WiFi instead of mobile data, 2) Disable ad blocker/VPN, 3) Retry</small>';
    certPanel.classList.add('has-results');
    console.error('[PING GET FAILED]', err.message);
    return;
  }
  
  // Phase 2: POST connectivity check (no image, tiny body)
  cs.textContent = 'Checking connection (2/3)...';
  try {
    const postTest = await fetch('https://genealogy-api.vercel.app/api/test-post', { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify({ test: true })
    });
    if (!postTest.ok) throw new Error('API POST test failed: ' + postTest.status);
    const postJson = await postTest.json();
    console.log('[POST TEST OK]', postJson);
  } catch (err) {
    cs.className = 'cert-status error';
    cs.innerHTML = 'Network error: POST requests blocked.<br><small>Your network or browser may block uploads. Try: 1) Different WiFi, 2) Chrome/Safari, 3) Disable privacy extensions</small>';
    certPanel.classList.add('has-results');
    console.error('[PING POST FAILED]', err.message);
    return;
  }
  
  // Phase 3: Send actual image with retries
  const payloadSize = Math.round(base64.length * 0.75 / 1024);
  cs.innerHTML = 'Scanning certificate...<br><small>Image: ' + payloadSize + 'KB. Usually 5-10s</small>';
  document.getElementById('certRetry').style.display = '';

  const payload = JSON.stringify({ image: base64, certType: selectedCertType });
  console.log('[UPLOAD] certType:', selectedCertType, '| Payload:', Math.round(payload.length / 1024), 'KB | URL:', API_URL);

  let lastErr = null;
  for (let attempt = 1; attempt <= 6; attempt++) {
    console.log('[UPLOAD] Attempt', attempt, '/6');
    cs.innerHTML = 'Scanning certificate (attempt ' + attempt + '/6)...<br><small>Please wait</small>';

    try {
      let resp;
      if (attempt === 1) {
        resp = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload });
      } else if (attempt === 2) {
        resp = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload, credentials: 'omit' });
      } else {
        resp = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', API_URL);
          xhr.setRequestHeader('Content-Type', 'application/json');
          xhr.onload = () => resolve({ status: xhr.status, json: () => Promise.resolve(JSON.parse(xhr.responseText)) });
          xhr.onerror = () => reject(new Error('XHR network error'));
          xhr.send(payload);
        });
      }

      console.log('[UPLOAD] Attempt', attempt, 'response status:', resp.status);
      const json = await resp.json();
      console.log('[UPLOAD] Attempt', attempt, 'response:', JSON.stringify(json).slice(0, 200));

      // Primary model overloaded — wait and retry instead of falling through
      if (json.error === 'PRIMARY_OVERLOADED' && json.retryable) {
        const waitSec = attempt <= 3 ? 12 : 8;
        console.log('[UPLOAD] Primary model overloaded, waiting', waitSec, 's before retry');
        cs.innerHTML = 'Server is busy (attempt ' + attempt + '/6).<br><small>Waiting ' + waitSec + 's before retry</small>';
        await new Promise(r => setTimeout(r, waitSec * 1000));
        continue; // retry same attempt number (don't increment)
      }

      if (!json.success) {
        cs.className = 'cert-status error';
        cs.innerHTML = 'Scan failed: ' + (json.error || json.message || 'Unknown error') + '<br><small>Tap Retry to try again</small>';
        certPanel.classList.add('has-results');
        return;
      }
      lastTranscription = json.data;
      cs.className = 'cert-status success';
      cs.textContent = '✓ Cert type: ' + (json.data.type || 'unknown').toUpperCase();
      renderTranscriptionResults(json.data);
      certPanel.classList.add('has-results');
      return; // Success!
    } catch (err) {
      console.error('[UPLOAD] Attempt', attempt, 'failed:', err.name, err.message);
      lastErr = err;
      if (attempt < 6) {
        cs.innerHTML = 'Retrying in 3s (attempt ' + (attempt + 1) + '/6)...';
        await new Promise(r => setTimeout(r, 3000));
      }
    }
  }

  // All 6 attempts failed
  cs.className = 'cert-status error';
  let msg = lastErr?.name === 'AbortError' ? 'Scan timed out after 45 seconds.' : (lastErr?.message || 'Could not reach server');
  if (msg.includes('Failed to fetch')) msg = 'Connection failed on image upload. Your network may block large uploads.';
  const debugId = 'debug_' + Date.now();
  cs.innerHTML = 'Network error: ' + msg + '<br><small>Try: 1) Different WiFi, 2) Camera not gallery, 3) Clear and retry</small><br><button onclick="document.getElementById(\'' + debugId + '\').style.display=\'block\'" style="margin-top:6px;padding:4px 8px;font-size:11px;background:#8a7a5a;color:#fff;border:none;border-radius:4px;">Show Debug Logs</button><pre id="' + debugId + '" style="display:none;margin-top:6px;padding:6px;background:#1a1510;color:#e8dcc8;font-size:10px;max-height:150px;overflow:auto;border-radius:4px;white-space:pre-wrap;">' + getDebugLogs().replace(/</g,'&lt;') + '</pre>';
  certPanel.classList.add('has-results');
}

function renderTranscriptionResults(data) {
  const container = document.getElementById('certResults');
  container.innerHTML = '';
  selectedEntryIndex = 0;
  const entries = data.entries || [data];
  let type = data.type || 'unknown';
  if (type === 'unknown' && entries.length > 0) {
    const first = entries[0];
    if (first.groom?.name || first.bride?.name) type = 'marriage';
    else if (first.child?.name || first.father?.name || first.mother?.name) type = 'birth';
    else if (first.deceased?.name) type = 'death';
  }
  entries.forEach((entry, idx) => {
    const card = document.createElement('div');
    card.className = 'cert-result-card' + (idx === 0 ? ' selected' : '');
    card.dataset.index = idx;
    const fields = extractEntryFields(entry, type);
    let html = '<div style="font-weight:600;font-size:13px;margin-bottom:6px;">' + entrySummary(entry, type) + '</div>';
    fields.forEach((f, fi) => {
      const fieldId = 'cf_' + idx + '_' + fi;
      html += '<div class="cert-field-edit"><span class="cert-field-label">' + f.label + ':</span><input id="' + fieldId + '" type="text" value="' + f.value.replace(/"/g, '&quot;') + '" data-entry="' + idx + '" data-field="' + f.key + '" onfocus="event.stopPropagation()" onclick="event.stopPropagation()"></div>';
    });
    card.innerHTML = html;
    card.addEventListener('click', () => {
      // Save current edits before switching
      syncCertEdits();
      document.querySelectorAll('.cert-result-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected'); selectedEntryIndex = idx;
    });
    container.appendChild(card);
  });
}

// Sync editable field values back into lastTranscription
function syncCertEdits() {
  if (!lastTranscription) return;
  const entries = lastTranscription.entries || [lastTranscription];
  document.querySelectorAll('#certResults input[data-field]').forEach(input => {
    const eIdx = parseInt(input.dataset.entry);
    const field = input.dataset.field;
    const entry = entries[eIdx];
    if (!entry) return;
    const val = input.value;
    // Set value on the nested object using dot notation (e.g. "child.name", "father.name")
    const parts = field.split('.');
    let obj = entry;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = val;
  });
}

function extractEntryFields(entry, type) {
  const fields = [];
  if (type === 'marriage') {
    if (entry.groom?.name) fields.push({ label: 'Groom', value: entry.groom.name, key: 'groom.name' });
    if (entry.groom?.age) fields.push({ label: 'Groom Age', value: entry.groom.age, key: 'groom.age' });
    if (entry.bride?.name) fields.push({ label: 'Bride', value: entry.bride.name, key: 'bride.name' });
    if (entry.bride?.age) fields.push({ label: 'Bride Age', value: entry.bride.age, key: 'bride.age' });
    if (entry.groomFather?.name) fields.push({ label: "Groom's Father", value: entry.groomFather.name, key: 'groomFather.name' });
    if (entry.groomMother?.name) fields.push({ label: "Groom's Mother", value: entry.groomMother.name + (entry.groomMother.maidenName ? ' (m.s. ' + entry.groomMother.maidenName + ')' : ''), key: 'groomMother.name' });
    if (entry.groomMother?.maidenName) fields.push({ label: "Groom's Mother m.s.", value: entry.groomMother.maidenName, key: 'groomMother.maidenName' });
    if (entry.brideFather?.name) fields.push({ label: "Bride's Father", value: entry.brideFather.name, key: 'brideFather.name' });
    if (entry.brideMother?.name) fields.push({ label: "Bride's Mother", value: entry.brideMother.name + (entry.brideMother.maidenName ? ' (m.s. ' + entry.brideMother.maidenName + ')' : ''), key: 'brideMother.name' });
    if (entry.brideMother?.maidenName) fields.push({ label: "Bride's Mother m.s.", value: entry.brideMother.maidenName, key: 'brideMother.maidenName' });
    if (entry.date) fields.push({ label: 'Date', value: entry.date, key: 'date' });
  } else if (type === 'birth') {
    if (entry.child?.name) fields.push({ label: 'Child', value: entry.child.name, key: 'child.name' });
    if (entry.child?.birthDate) fields.push({ label: 'Birth Date', value: entry.child.birthDate, key: 'child.birthDate' });
    if (entry.father?.name) fields.push({ label: 'Father', value: entry.father.name, key: 'father.name' });
    if (entry.mother?.name) fields.push({ label: 'Mother', value: entry.mother.name + (entry.mother.maidenName ? ' (m.s. ' + entry.mother.maidenName + ')' : entry.mother.maidenSurname ? ' (m.s. ' + entry.mother.maidenSurname + ')' : ''), key: 'mother.name' });
    if (entry.mother?.maidenName || entry.mother?.maidenSurname) fields.push({ label: 'Mother m.s.', value: entry.mother?.maidenName || entry.mother?.maidenSurname || '', key: 'mother.maidenName' });
    if (entry.district) fields.push({ label: 'District', value: entry.district, key: 'district' });
  } else if (type === 'death') {
    if (entry.deceased?.name) fields.push({ label: 'Deceased', value: entry.deceased.name, key: 'deceased.name' });
    if (entry.deceased?.age) fields.push({ label: 'Age', value: entry.deceased.age, key: 'deceased.age' });
    if (entry.deceased?.spouseName) fields.push({ label: 'Spouse', value: entry.deceased.spouseName, key: 'deceased.spouseName' });
    if (entry.father?.name) fields.push({ label: 'Father', value: entry.father.name, key: 'father.name' });
    if (entry.mother?.name) fields.push({ label: 'Mother', value: entry.mother.name + (entry.mother.maidenName ? ' (m.s. ' + entry.mother.maidenName + ')' : ''), key: 'mother.name' });
    if (entry.mother?.maidenName) fields.push({ label: 'Mother m.s.', value: entry.mother.maidenName, key: 'mother.maidenName' });
    if (entry.deathDate) fields.push({ label: 'Date', value: entry.deathDate, key: 'deathDate' });
    if (entry.causeOfDeath) fields.push({ label: 'Cause', value: entry.causeOfDeath, key: 'causeOfDeath' });
  }
  return fields;
}

function entrySummary(entry, type) {
  const name = entry.child?.name || entry.groom?.name || entry.bride?.name || entry.deceased?.name || 'Unknown';
  const date = entry.child?.birthDate || entry.date || entry.deathDate || '';
  if (type === 'marriage') return (entry.groom?.name || 'Unknown') + ' & ' + (entry.bride?.name || 'Unknown') + (date ? ' — ' + date : '');
  if (type === 'birth') return name + (date ? ' — b. ' + date : '');
  if (type === 'death') return name + (date ? ' — d. ' + date : '');
  return name;
}

// Apply scanned cert data to the people array
function applyCertToPerson(entry, type) {
  if (!entry) return;
  const changed = [];
  if (type === 'birth') applyBirthEntry(entry, changed);
  else if (type === 'marriage') applyMarriageEntry(entry, changed);
  else if (type === 'death') applyDeathEntry(entry, changed);
  if (changed.length) { renderTree(); showToast('Applied to ' + changed.length + ' people'); }
  else { showToast('No matching people found — cert data stored'); }
  // Scroll to the first changed person so you can see the result
  if (changed.length > 0) {
    const target = changed[0];
    setTimeout(() => {
      const el = cardEls.get(target.id);
      if (el) {
        const cx = (el.offsetLeft + el.offsetWidth / 2) * zoom;
        const cy = (el.offsetTop + el.offsetHeight / 2) * zoom;
        scroll.scrollTo({ left: Math.max(0, cx - scroll.clientWidth / 2), top: Math.max(0, cy - scroll.clientHeight / 2), behavior: 'smooth' });
      }
    }, 200);
  }
}

function normalizeName(name) {
  if (!name) return '';
  const parts = name.toLowerCase().trim().split(/\s+/);
  if (parts.length < 2) return parts[0] || '';
  return parts[0] + ' ' + parts[parts.length - 1];
}

function findPerson(name, opts) {
  opts = opts || {};
  if (!name) return null;
  const norm = normalizeName(name);
  let best = null, bestScore = 0;
  for (const p of people) {
    const pNorm = normalizeName(p.name);
    const pFull = normalizeName(p.fullName || '');
    const pMaiden = normalizeName(p.maidenName || '');
    let score = 0;
    if (pNorm === norm || pFull === norm) score = 100;
    else if ((p.name || '').toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes((p.name || '').toLowerCase())) score = 70;
    else if (pNorm.includes(norm) || norm.includes(pNorm)) score = 50;
    // Also match by maiden name (for marriage certs where bride is listed by maiden name)
    if (opts.checkMaiden && pMaiden === norm) score = 90;
    else if (opts.checkMaiden && (pMaiden.includes(norm) || norm.includes(pMaiden))) score = 60;
    if (score > bestScore) { bestScore = score; best = p; }
  }
  return bestScore >= 50 ? best : null;
}

function getOrCreateParent(parentName, parentGen, spouseName, changed) {
  if (!parentName) return null;
  let p = findPerson(parentName) || findPerson(parentName, { checkMaiden: true });
  if (!p) {
    p = createPerson(nextId++, parentGen, parentName, '?', 'probable', {});
    people.push(p); changed.push(p);
  } else if (p.name === 'Name' || p.status === 'blank') {
    // Upgraded a blank placeholder — fill in the real name
    p.name = parentName;
    p.fullName = parentName;
    p.status = 'probable';
    changed.push(p);
  }
  return p.id;
}

function applyBirthEntry(entry, changed) {
  const childName = entry.child?.name; if (!childName) return;
  
  // Find or create the child (always Gen 0 for root person)
  let child = people.find(p => p.gen === 0);
  if (!child || (child.name !== 'Name' && child.status !== 'blank')) {
    // If Gen 0 is already filled, find by name
    child = findPerson(childName);
  }
  if (!child) {
    child = createPerson(nextId++, 0, childName, '?', 'probable', {});
    people.push(child);
  }
  
  child.name = childName;
  child.fullName = childName;
  if (entry.child?.birthDate) { child.birthDate = entry.child.birthDate; child.years = 'b. ' + entry.child.birthDate; }
  child.status = 'confirmed';
  child.docs.push({ type: 'bc' });
  changed.push(child);

  // Use child's existing parent placeholders (always IDs 2,3 in fresh tree)
  if (!child.parents || child.parents.length < 2) {
    // Re-wire parents from tree structure if missing
    const gen1 = people.filter(p => p.gen === 1).sort((a,b) => a.id - b.id);
    if (gen1.length >= 2) child.parents = [gen1[0].id, gen1[1].id];
  }
  
  if (child.parents && child.parents.length >= 2) {
    const father = people.find(p => p.id === child.parents[0]);
    const mother = people.find(p => p.id === child.parents[1]);
    
    if (father && entry.father?.name) {
      father.name = entry.father.name;
      father.fullName = entry.father.name;
      if (father.status === 'blank') father.status = 'probable';
      changed.push(father);
    }
    if (mother && entry.mother?.name) {
      mother.name = entry.mother.name;
      mother.fullName = entry.mother.name;
      if (mother.status === 'blank') mother.status = 'probable';
      if (entry.mother?.maidenName) mother.maidenName = entry.mother.maidenName;
      if (entry.mother?.maidenSurname) mother.maidenName = entry.mother.maidenSurname;
      changed.push(mother);
    }
    
    // Wire spouse relationship between parents
    if (father && mother) {
      father.spouseId = mother.id;
      mother.spouseId = father.id;
      father.spouseName = mother.name;
      mother.spouseName = father.name;
    }
  }
}

function applyMarriageEntry(entry, changed) {
  const groomName = entry.groom?.name, brideName = entry.bride?.name;
  if (!groomName || !brideName) return;
  
  // Step 1: Find groom by name
  let groom = findPerson(groomName);
  
  // Step 2: Find bride — SPOUSE LINK FIRST (definitive)
  let bride = null;
  if (groom && groom.spouseId) {
    const spouse = people.find(p => p.id === groom.spouseId);
    if (spouse) {
      // Verify first name matches
      const brideFirst = brideName.split(/\s+/)[0]?.toLowerCase();
      const spouseFirst = spouse.name.split(/\s+/)[0]?.toLowerCase();
      if (spouseFirst === brideFirst) {
        bride = spouse;
      }
    }
  }
  
  // Step 3: If no spouse link, fall back to name matching
  if (!bride) {
    bride = findPerson(brideName);
    if (!bride) bride = findPerson(brideName, { checkMaiden: true });
  }
  
  // Step 4: Create new people only if not found
  if (!groom) {
    groom = createPerson(nextId++, 0, groomName, '?', 'probable', {});
    people.push(groom); changed.push(groom);
  }
  if (!bride) {
    bride = createPerson(nextId++, 0, brideName, '?', 'probable', {});
    people.push(bride); changed.push(bride);
  }
  
  // Step 5: Wire spouse relationship
  groom.spouseId = bride.id;
  bride.spouseId = groom.id;
  groom.spouseName = bride.name;
  bride.spouseName = groom.name;
  
  // Step 6: Update bride's display name to married name if matched by maiden
  const groomSurname = groomName.split(/\s+/).pop();
  const brideSurname = bride.name.split(/\s+/).pop();
  if (brideSurname.toLowerCase() !== groomSurname.toLowerCase()) {
    const brideFirst = bride.name.split(/\s+/).slice(0, -1).join(' ') || bride.name.split(/\s+/)[0];
    bride.name = brideFirst + ' ' + groomSurname;
    bride.fullName = bride.name;
    changed.push(bride);
  }
  
  groom.status = 'confirmed'; bride.status = 'confirmed';
  groom.docs.push({ type: 'mc' }); bride.docs.push({ type: 'mc' });
  if (entry.date) { groom.years = (groom.years === '?' ? '' : groom.years.replace(/\?/g,'')) + ' m. ' + entry.date; }
  changed.push(groom); changed.push(bride);

  // Step 7: Update parents using tree structure ONLY — never search by name for parents
  function updateParents(person, fatherName, motherName, motherMaiden) {
    if (!person || !person.parents || person.parents.length < 2) return;
    const father = people.find(p => p.id === person.parents[0]);
    const mother = people.find(p => p.id === person.parents[1]);
    
    // Only fill blanks — never overwrite an existing confirmed name
    if (father && fatherName && (father.name === 'Name' || father.status === 'blank' || father.status === 'probable')) {
      father.name = fatherName; father.fullName = fatherName;
      if (father.status === 'blank') father.status = 'probable';
      changed.push(father);
    }
    if (mother && motherName && (mother.name === 'Name' || mother.status === 'blank' || mother.status === 'probable')) {
      mother.name = motherName; mother.fullName = motherName;
      if (mother.status === 'blank') mother.status = 'probable';
      if (motherMaiden) mother.maidenName = motherMaiden;
      changed.push(mother);
    }
    // Wire spouse relationship between grandparents
    if (father && mother) {
      father.spouseId = mother.id;
      mother.spouseId = father.id;
      father.spouseName = mother.name;
      mother.spouseName = father.name;
    }
  }

  // Groom's parents → groom.parents[0], groom.parents[1]
  if (groom.parents && groom.parents.length >= 2) {
    updateParents(groom, entry.groomFather?.name, entry.groomMother?.name, entry.groomMother?.maidenName);
  }
  
  // Bride's parents → bride.parents[0], bride.parents[1]
  if (bride.parents && bride.parents.length >= 2) {
    updateParents(bride, entry.brideFather?.name, entry.brideMother?.name, entry.brideMother?.maidenName);
  }
}

function applyDeathEntry(entry, changed) {
  const decName = entry.deceased?.name; if (!decName) return;
  let dec = findPerson(decName);
  if (!dec) { dec = createPerson(nextId++, 0, decName, '?', 'probable', {}); people.push(dec); changed.push(dec); }
  if (entry.deathDate) { dec.deathDate = entry.deathDate; dec.years = (dec.birthDate ? dec.birthDate + ' — ' : '') + entry.deathDate; }
  if (entry.deceased?.age) dec.years += ' (age ' + entry.deceased.age + ')';
  if (entry.deceased?.occupation) dec.occupation = entry.deceased.occupation;
  if (entry.deceased?.spouseName) dec.spouseName = entry.deceased.spouseName;
  dec.docs.push({ type: 'dc' }); dec.status = 'confirmed';
  changed.push(dec);

  // Use existing parent placeholders if wired — only fill blanks
  if (dec.parents && dec.parents.length >= 2) {
    const father = people.find(p => p.id === dec.parents[0]);
    const mother = people.find(p => p.id === dec.parents[1]);
    if (father && entry.father?.name && (father.name === 'Name' || father.status === 'blank' || father.status === 'probable')) {
      father.name = entry.father.name; father.fullName = entry.father.name;
      if (father.status === 'blank') father.status = 'probable';
      changed.push(father);
    }
    if (mother && entry.mother?.name && (mother.name === 'Name' || mother.status === 'blank' || mother.status === 'probable')) {
      mother.name = entry.mother.name; mother.fullName = entry.mother.name;
      if (mother.status === 'blank') mother.status = 'probable';
      if (entry.mother?.maidenName) mother.maidenName = entry.mother?.maidenName;
      changed.push(mother);
    }
    // Wire spouse relationship between parents
    if (father && mother) {
      father.spouseId = mother.id;
      mother.spouseId = father.id;
      father.spouseName = mother.name;
      mother.spouseName = father.name;
    }
  }
}

document.getElementById('certConfirm').addEventListener('click', () => {
  if (!lastTranscription) return;
  syncCertEdits();
  const entries = lastTranscription.entries || [lastTranscription];
  const entry = entries[selectedEntryIndex || 0];
  if (!entry) return;
  let type = lastTranscription.type || 'unknown';
  if (type === 'unknown') {
    if (entry.groom?.name || entry.bride?.name) type = 'marriage';
    else if (entry.child?.name || entry.father?.name || entry.mother?.name) type = 'birth';
    else if (entry.deceased?.name) type = 'death';
  }
  applyCertToPerson(entry, type);
  certPanel.classList.remove('active');
  certPanel.classList.remove('has-results');
});

document.getElementById('certClear').addEventListener('click', () => {
  clearCertPanel();
});

document.getElementById('certRetry').addEventListener('click', () => {
  if (pendingDocFile || pendingDocImage) {
    // Re-scan the same image without picking again
    document.getElementById('certStatus').style.display = 'none';
    document.getElementById('certResults').innerHTML = '';
    certPanel.classList.remove('has-results');
    lastTranscription = null;
    if (pendingDocImage) {
      sendToTranscriptionAPI(pendingDocImage);
    } else if (pendingDocFile) {
      processDocFile(pendingDocFile);
    }
  } else {
    // No image stored, trigger file picker
    clearCertPanel();
    document.getElementById('certFileInput').value = '';
    document.getElementById('certFileInput').click();
  }
});

function saveSession() {
  const payload = { version: 5, exportedAt: new Date().toISOString(), people: people, nextId: nextId };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'familytree_' + new Date().toISOString().slice(0, 10) + '.familytree';
  a.click(); URL.revokeObjectURL(url); showToast('Session saved');
}
async function loadSession(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.people) { showToast('Invalid session file'); return; }
    people = data.people; nextId = data.nextId || Math.max(...people.map(p => p.id)) + 1;
    renderTree(); showToast('Loaded: ' + people.length + ' people');
  } catch (err) { showToast('Load failed: ' + (err.message || 'Unknown error')); }
}
document.getElementById('saveBtn').addEventListener('click', saveSession);
document.getElementById('loadBtn').addEventListener('click', () => document.getElementById('loadFileInput').click());
document.getElementById('loadFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (file) loadSession(file); e.target.value = '';
});
document.getElementById('resetBtn').addEventListener('click', () => {
  const dlg = document.getElementById('confirmDialog');
  dlg.style.display = 'flex';
  document.getElementById('confirmOk').onclick = () => {
    localStorage.removeItem('familytree_data_v5');
    location.reload();
  };
  document.getElementById('confirmCancel').onclick = () => {
    dlg.style.display = 'none';
  };
});
setInterval(() => { localStorage.setItem('familytree_data_v5', JSON.stringify({people: people, nextId: nextId})); }, 30000);
function autoRestore() {
  const saved = localStorage.getItem('familytree_data_v5');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.people && data.people.length > 0) {
        people = data.people; nextId = data.nextId || Math.max(...people.map(p => p.id)) + 1;
        showToast('Restored ' + people.length + ' people from auto-save'); return true;
      }
    } catch (e) {}
  }
  return false;
}
function clearStorage() {
  localStorage.removeItem('familytree_data_v5');
  showToast('Storage cleared — reload to start fresh');
}
function showToast(msg, duration) {
  duration = duration || 2500;
  const existing = document.getElementById('toastMsg'); if (existing) existing.remove();
  const el = document.createElement('div'); el.id = 'toastMsg'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.4s'; }, duration);
  setTimeout(() => el.remove(), duration + 500);
}
if (!autoRestore()) initDefaultData();
renderTree();
document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';

function centerOnGen0() {
  // Find Graeme (the root person, ID 1, gen 0)
  const root = people.find(p => p.gen === 0);
  if (!root) return;
  const rootEl = cardEls.get(root.id);
  if (!rootEl) return;
  // At 25% zoom, center Gen 0 vertically in viewport, visible on left
  const cardCenterX = rootEl.offsetLeft + rootEl.offsetWidth / 2;
  const cardCenterY = rootEl.offsetTop + rootEl.offsetHeight / 2;
  // Position so Gen 0 is ~1/3 from left edge, vertically centered
  scroll.scrollLeft = Math.max(0, (cardCenterX * zoom) - scroll.clientWidth * 0.25);
  scroll.scrollTop = Math.max(0, (cardCenterY * zoom) - scroll.clientHeight / 2);
}
setTimeout(() => centerOnGen0(), 150);

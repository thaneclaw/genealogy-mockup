<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roots — Your Family Tree</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f3ef;
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 44px;
            background: #1a1a1a;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; z-index: 100;
        }
        .header h1 { font-size: 16px; font-weight: 700; color: #fff; }
        .header-stats { display: flex; gap: 12px; font-size: 10px; color: #888; }
        .header-stats span { color: #fff; font-weight: 600; }
        .header-btn { width: 28px; height: 28px; background: #333; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }

        .tree-scroll {
            position: fixed;
            top: 44px; left: 0; right: 0; bottom: 0;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background: #f5f3ef;
        }

        .tree-wrap {
            position: relative;
            min-width: fit-content;
            min-height: 100%;
            padding: 20px 16px;
        }

        .person-card {
            position: absolute;
            width: 124px;
            background: #fff;
            border-radius: 10px;
            padding: 9px 11px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border-left: 3px solid transparent;
            cursor: pointer;
            z-index: 2;
        }
        .person-card:active { transform: scale(0.96); }
        .person-card.confirmed { border-left-color: #22c55e; }
        .person-card.probable { border-left-color: #f59e0b; }
        .person-card.brickwall { border-left-color: #ef4444; border-left-style: dashed; }
        .person-card.you { border: 2px solid #3b82f6; }

        .person-card .name { font-size: 11px; font-weight: 600; color: #1a1a1a; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .person-card .years { font-size: 9px; color: #888; margin-top: 2px; }

        /* SVG lines positioned absolutely within tree-wrap */
        .lines-svg {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .pro-banner {
            position: fixed; top: 48px; right: 8px;
            background: #fef3c7; border: 1px solid #f59e0b;
            padding: 6px 10px; border-radius: 6px;
            font-size: 10px; z-index: 99; color: #92400e;
        }
        .pro-banner strong { font-size: 11px; }

        .detail-panel { display: none; position: fixed; top: 0; right: 0; width: 280px; max-width: 85vw; height: 100vh; background: #fff; z-index: 200; overflow-y: auto; }
        .detail-panel.active { display: block; animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .detail-header { background: #1a1a1a; color: #fff; padding: 16px; position: relative; }
        .detail-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .detail-header h2 { font-size: 16px; font-weight: 600; }
        .detail-years { color: #999; font-size: 12px; margin-top: 2px; }
        .detail-body { padding: 14px; color: #333; }
        .detail-section { margin-bottom: 18px; }
        .detail-section h3 { font-size: 10px; text-transform: uppercase; color: #999; margin-bottom: 8px; letter-spacing: 0.5px; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 12px; }
        .badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px; }
        .badge-confirmed { background: #dcfce7; color: #166534; }
        .badge-probable { background: #fef3c7; color: #92400e; }
        .badge-brickwall { background: #fee2e2; color: #991b1b; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 150; }
        .overlay.active { display: block; }
        .scroll-hint { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); color: #fff; padding: 5px 12px; border-radius: 16px; font-size: 10px; z-index: 90; animation: fadeOut 3s forwards; animation-delay: 2s; pointer-events: none; }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Roots</h1>
        <div class="header-stats">
            <div>People: <span>23</span></div>
            <div>Confirmed: <span>14</span></div>
            <div>Walls: <span>4</span></div>
        </div>
        <button class="header-btn">+</button>
    </div>

    <div class="pro-banner">
        <strong>4 brick walls</strong>
        AI research plans available
    </div>

    <div class="tree-scroll" id="treeScroll">
        <div class="tree-wrap" id="treeWrap">
            <svg class="lines-svg" id="linesSvg"></svg>
        </div>
    </div>

    <div class="scroll-hint">← Swipe right to explore →</div>

    <div class="overlay" id="overlay" onclick="closePanel()"></div>
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <button class="detail-close" onclick="closePanel()">&times;</button>
            <h2 id="panelName"></h2>
            <div class="detail-years" id="panelYears"></div>
        </div>
        <div class="detail-body" id="panelBody"></div>
    </div>

    <script>
    (function() {
        'use strict';

        // === DATA ===
        const people = [
            {id:0, gen:0, name:"Graeme Mooney", years:"b. 1966", status:"you", parents:null},
            {id:1, gen:1, name:"Joseph Mooney", years:"1931–1974", status:"confirmed", parents:[3,4]},
            {id:2, gen:1, name:"Rose Craigie", years:"1931–", status:"confirmed", parents:[5,6]},
            {id:3, gen:2, name:"Joseph Mooney", years:"1906–1974", status:"confirmed", parents:[7,8]},
            {id:4, gen:2, name:"Alice Lynch", years:"1907–1978", status:"confirmed", parents:[9,10]},
            {id:5, gen:2, name:"Andrew Craigie", years:"1904–1972", status:"confirmed", parents:[11,12]},
            {id:6, gen:2, name:"Agnes Crawford", years:"1903–", status:"confirmed", parents:[13,14]},
            {id:7, gen:3, name:"Joseph Mooney", years:"1879–?", status:"probable", parents:[15,16]},
            {id:8, gen:3, name:"Catherine Farrell", years:"~1882–1960", status:"probable", parents:[15,16]},
            {id:9, gen:3, name:"Edward Lynch", years:"1866–?", status:"confirmed", note:"Jute millworker", parents:[17,18]},
            {id:10, gen:3, name:"Mary Graham", years:"~1868–?", status:"probable", parents:[17,18]},
            {id:11, gen:3, name:"James Craigie", years:"1872–?", status:"confirmed", note:"England, coal miner", parents:[19,20]},
            {id:12, gen:3, name:"Agnes Henderson", years:"~1876–?", status:"probable", parents:[19,20]},
            {id:13, gen:3, name:"Patrick Crawford", years:"~1872–?", status:"probable", note:"Marriage cert needed", parents:[21,22]},
            {id:14, gen:3, name:"Rose MacFarland", years:"1872–?", status:"probable", parents:[21,22]},
            {id:15, gen:4, name:"Thomas Mooney", years:"~1862–1911", status:"brickwall", note:"Father unknown"},
            {id:16, gen:4, name:"Catherine Lynch", years:"~1857–?", status:"probable", note:"Age conflict 1881"},
            {id:17, gen:4, name:"Owen Lynch", years:"1832–?", status:"probable"},
            {id:18, gen:4, name:"Bridget Kelly", years:"~1835–?", status:"probable"},
            {id:19, gen:4, name:"William Craigie", years:"~1845–?", status:"probable"},
            {id:20, gen:4, name:"Margaret Smith", years:"~1848–?", status:"probable"},
            {id:21, gen:4, name:"John McFarland", years:"~1840–?", status:"brickwall", note:"Census shows James"},
            {id:22, gen:4, name:"Sarah McLaughlin", years:"~1842–?", status:"probable"}
        ];

        // === CONFIG ===
        const CARD_W = 124;
        const GAP_X = 36;  // horizontal gap
        const GAP_Y = 10;  // vertical gap between cards
        const JUNCT_DIST = 14; // how far left of parent column the junction sits

        const wrap = document.getElementById('treeWrap');
        const svg = document.getElementById('linesSvg');
        const scroll = document.getElementById('treeScroll');
        const svgNS = 'http://www.w3.org/2000/svg';

        // === STEP 1: Group by generation ===
        const gens = [[], [], [], [], []];
        people.forEach(p => gens[p.gen].push(p));

        // === STEP 2: Render all cards (hidden, to measure) ===
        const els = new Map(); // id -> element
        const colLeft = [0, 1, 2, 3, 4].map(g => g * (CARD_W + GAP_X));

        people.forEach(p => {
            const el = document.createElement('div');
            el.className = `person-card ${p.status} ${p.id === 0 ? 'you' : ''}`;
            el.innerHTML = `<div class="name">${p.name}</div><div class="years">${p.years}</div>`;
            el.style.left = colLeft[p.gen] + 'px';
            el.style.top = '0px';
            el.style.opacity = '0'; // measure-only
            el.onclick = () => openPanel(p);
            wrap.appendChild(el);
            els.set(p.id, el);
        });

        // Force layout
        document.body.offsetHeight;

        // === STEP 3: Measure ===
        const hMap = new Map();
        els.forEach((el, id) => hMap.set(id, el.offsetHeight));

        // === STEP 4: Position each column independently, centered on viewport center ===
        const viewH = scroll.clientHeight;
        const viewMid = viewH / 2;

        const colHeights = gens.map(gen =
            gen.reduce((sum, p) => sum + hMap.get(p.id) + GAP_Y, 0) - GAP_Y
        );

        const topMap = new Map();
        gens.forEach((gen, gi) => {
            const colH = colHeights[gi];
            let y = viewMid - colH / 2; // column top, centered vertically
            if (y < 20) y = 20; // keep top padding
            gen.forEach(p => {
                topMap.set(p.id, y);
                y += hMap.get(p.id) + GAP_Y;
            });
        });

        // Apply positions
        els.forEach((el, id) => {
            el.style.top = topMap.get(id) + 'px';
            el.style.opacity = '1';
        });

        // Size container
        const maxW = colLeft[4] + CARD_W + 20;
        const maxH = Math.max(viewH, ...people.map(p => topMap.get(p.id) + hMap.get(p.id))) + 40;
        wrap.style.width = maxW + 'px';
        wrap.style.height = maxH + 'px';

        // === STEP 5: Draw connectors ===
        function drawLines() {
            const wrapRect = wrap.getBoundingClientRect();

            svg.setAttribute('width', wrap.scrollWidth);
            svg.setAttribute('height', wrap.scrollHeight);
            svg.innerHTML = '';

            people.forEach(child => {
                if (!child.parents) return;
                const childEl = els.get(child.id);
                const fatherEl = els.get(child.parents[0]);
                if (!childEl || !fatherEl) return;

                const cRect = childEl.getBoundingClientRect();
                // Child right edge position relative to wrap
                const cx = (cRect.right - wrapRect.left);
                const cy = (cRect.top - wrapRect.top) + cRect.height / 2;

                const fRect = fatherEl.getBoundingClientRect();
                const fx = (fRect.left - wrapRect.left); // father left edge
                const fy = (fRect.top - wrapRect.top) + fRect.height / 2;

                const jx = fx - JUNCT_DIST;

                if (child.parents.length > 1 && els.get(child.parents[1])) {
                    const motherEl = els.get(child.parents[1]);
                    const mRect = motherEl.getBoundingClientRect();
                    const mx = (mRect.left - wrapRect.left); // mother left edge
                    const my = (mRect.top - wrapRect.top) + mRect.height / 2;
                    const midY = (fy + my) / 2;

                    // Curve: child right edge -> junction point
                    const curve = document.createElementNS(svgNS, 'path');
                    curve.setAttribute('d', `M${cx},${cy} C${cx+12},${cy} ${jx-6},${midY} ${jx},${midY}`);
                    curve.setAttribute('stroke', '#c4c4c4');
                    curve.setAttribute('stroke-width', '1.5');
                    curve.setAttribute('fill', 'none');
                    svg.appendChild(curve);

                    // Vertical line between parents' junction
                    const vLine = document.createElementNS(svgNS, 'line');
                    vLine.setAttribute('x1', jx); vLine.setAttribute('y1', fy);
                    vLine.setAttribute('x2', jx); vLine.setAttribute('y2', my);
                    vLine.setAttribute('stroke', '#c4c4c4');
                    vLine.setAttribute('stroke-width', '1.5');
                    svg.appendChild(vLine);

                    // Horizontal to father
                    const fLine = document.createElementNS(svgNS, 'line');
                    fLine.setAttribute('x1', jx); fLine.setAttribute('y1', fy);
                    fLine.setAttribute('x2', fx); fLine.setAttribute('y2', fy);
                    fLine.setAttribute('stroke', '#c4c4c4');
                    fLine.setAttribute('stroke-width', '1.5');
                    svg.appendChild(fLine);

                    // Horizontal to mother
                    const mLine = document.createElementNS(svgNS, 'line');
                    mLine.setAttribute('x1', jx); mLine.setAttribute('y1', my);
                    mLine.setAttribute('x2', mx); mLine.setAttribute('y2', my);
                    mLine.setAttribute('stroke', '#c4c4c4');
                    mLine.setAttribute('stroke-width', '1.5');
                    svg.appendChild(mLine);
                } else {
                    // Single parent
                    const line = document.createElementNS(svgNS, 'line');
                    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
                    line.setAttribute('x2', fx); line.setAttribute('y2', fy);
                    line.setAttribute('stroke', '#c4c4c4');
                    line.setAttribute('stroke-width', '1.5');
                    svg.appendChild(line);
                }
            });
        }

        drawLines();
        scroll.addEventListener('scroll', drawLines);
        window.addEventListener('resize', drawLines);

        // Center horizontally on Gen 0 initially
        setTimeout(() => {
            const rootEl = els.get(0);
            if (rootEl) {
                const rRect = rootEl.getBoundingClientRect();
                scroll.scrollLeft = 0;
            }
        }, 50);

        // === PANEL ===
        window.openPanel = function(person) {
            document.getElementById('panelName').textContent = person.name;
            document.getElementById('panelYears').textContent = person.years + (person.note ? ` · ${person.note}` : '');
            const labels = {confirmed:'Confirmed', probable:'Probable', brickwall:'Brick Wall', you:'You'};
            const colors = {confirmed:'badge-confirmed', probable:'badge-probable', brickwall:'badge-brickwall', you:'badge-confirmed'};
            document.getElementById('panelBody').innerHTML = `
                <div class="detail-section">
                    <h3>Status</h3>
                    <span class="badge ${colors[person.status]||'badge-probable'}">${labels[person.status]||person.status}</span>
                </div>
                <div class="detail-section">
                    <h3>Sources</h3>
                    <div class="detail-row">
                        <span class="detail-label">Confidence</span>
                        <span class="detail-value">${person.status==='confirmed'||person.status==='you'?'High':person.status==='probable'?'Medium':'Unknown'}</span>
                    </div>
                </div>
                ${person.status==='brickwall'?`
                <div class="detail-section">
                    <h3>Next Step</h3>
                    <p style="font-size:12px;color:#666;line-height:1.5;">Order the child's marriage cert to reveal both parents (£2 via ScotlandsPeople).</p>
                </div>`:''}
            `;
            document.getElementById('overlay').classList.add('active');
            document.getElementById('detailPanel').classList.add('active');
        };

        window.closePanel = function() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('detailPanel').classList.remove('active');
        };
    })();
    </script>
</body>
</html>
